<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>take quiz — uniquiz</title>

    <!-- bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm custom-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">uniquiz</a>
        </div>
    </nav>

    <!-- quiz header -->
    <header class="container text-center my-4">
        <h1 id="quiz-title" class="fw-bold">loading quiz...</h1>
        <p id="quiz-description" class="text-muted"></p>
    </header>

    <!-- quiz container -->
    <section id="quiz-container" class="container my-4">

        <!-- timer -->
        <div id="timer" class="mb-3 fs-5 fw-semibold">
            time left: <span id="time-remaining">00:00</span>
        </div>

        <!-- question -->
        <div id="question-text" class="mb-3 fs-4">
            <!-- js inserts question -->
            Loading Question...
        </div>

        <!-- options -->
        <div id="answer-container" class="mb-3">
            <!-- js inserts answer buttons -->
        </div>

        <!-- feedback -->
        <div id="feedback" class="mb-3"></div>

        <button id="submit-answer-btn" class="btn btn-primary">Check Answer!</button>

        <!-- next question -->
        <button id="next-question-btn" class="btn btn-primary" style="display: none;">
            next question
        </button>

    </section>

    <!-- score summary -->
    <section id="score-summary" class="container my-4" style="display: none;">

        <h2>your results</h2>

        <p id="final-score"></p>

        <div id="correct-answers" class="my-3"></div>

        <div id="past-scores" class="my-4">
            <h3>past scores</h3>
            <ul id="score-history"></ul>
        </div>

        <button id="retake-quiz-btn" class="btn btn-primary me-2">retake quiz</button>
        <button id="another-quiz-button" class="btn btn-outline-primary">choose another quiz</button>

    </section>

    <footer class="text-center p-3 mt-4">
        <p>uniquiz — cs212 group project</p>
    </footer>

    <script src="../../lib/libquizjson.js"></script>
    <script src="quiz.js"></script>
</body>
