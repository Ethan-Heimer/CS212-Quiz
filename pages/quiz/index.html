<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>take quiz — uniquiz</title>

    <!-- bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm custom-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="">uniquiz</a>
        </div>
    </nav>

    <!-- quiz header -->
    <header class="container text-center my-4">
        <h1 id="quiz-title" class="fw-bold">loading quiz...</h1>
        <p id="quiz-description" class="text-muted"></p>
    </header>

    <!-- quiz container -->
    <section id="quiz-container" class="container my-4">

        <!-- timer -->
        <div id="timer" class="mb-3 fs-5 fw-semibold">
            Time: 0:00
        </div>

        <!-- question -->
        <div id="question-text" class="mb-3 fs-4">
            <!-- js inserts question -->
            Loading Question...
        </div>

        <!-- options -->
        <div id="answer-container" class="mb-3">
            <!-- js inserts answer buttons -->
        </div>

        <!-- feedback -->
        <div id="feedback" class="mb-3"></div>

        <button id="submit-answer-btn" class="btn btn-primary">Check Answer!</button>

        <!-- next question -->
        <button id="next-question-btn" class="btn btn-primary" style="display: none;">
            next question
        </button>

    </section>

    <!-- score summary -->
    <section id="score-summary" class="container my-4" style="display: none;">

        <h2>Your results!</h2>

        <h5 id="final-score"></h5>
        <h5 id="final-time"></h5>

        <div id="correct-answers" class="my-3"></div>

        <h2>Past scores!</h2>
        <div id="past-scores" class="my-4">
            <section id="past-scores", class="container my-4">
                <table id="past-scores-header" class="shadow">
                    <thead id="past-scores-table-header">
                        <th>Quiz Name</th>
                        <th>Score</th>
                        <th>Percent</th>
                        <th>Time to Finish</th>
                    </thead>
                </table>

                <div id="past-scores-scroll-container" class="shadow">
                    <table id="past-scores-table">
                        <tbody id="past-scores-table-body">
                        </tbody>
                    </table>
                </div>
            </section>
        </div>

        <button id="retake-quiz-btn" class="btn btn-primary me-2">Retake quiz</button>
        <button id="another-quiz-button" class="btn btn-outline-primary">Choose another quiz</button>

    </section>

    <footer class="text-center p-3 mt-4">
        <p>uniquiz — cs212 group project</p>
    </footer>

    <script src="../../lib/libquizjson.js"></script>
    <script src="../../lib/libscore.js"></script>

    <script src="quiz.js"></script>
</body>
