<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Home</title>

    <style>
        .grid{
            display: grid;
            grid-template-columns: 32% 32% 32%;
            gap: 10px;
        }

        .shadow{
            box-shadow: 3px 3px 3px 3px #555555;
        }

        @media screen and (max-width: 600px){
            .grid{
                grid-template-columns: 49% 49%;
            }
        }

        @media screen and (max-width: 300px){
            .grid{
                grid-template-columns: 100%;
            }
        }
    </style>

</head>
<body>
    <form>
        <label for="search">Search</label>
        <input type="text" name="search" id="search">
    </form>

    <div class="grid">
        <quiz-card class="shadow" json="test_quiz.json"></quiz-card>
        <quiz-card class="shadow" json="test_quiz_2.json"></quiz-card>
        <quiz-card class="shadow" json="test_quiz_3.json"></quiz-card>

        <quiz-card class="shadow" json="test_quiz_3.json"></quiz-card>
        <quiz-card class="shadow" json="test_quiz_2.json"></quiz-card>
        <quiz-card class="shadow" json="test_quiz.json"></quiz-card>

        <quiz-card class="shadow" json="a_quiz_about_cats.json"></quiz-card>
        <quiz-card class="shadow" json="a_quiz_about_dogs.json"></quiz-card>
        <quiz-card class="shadow" json="javascript_quiz.json"></quiz-card>
    </div>


    <script src="../../lib/libquizjson.js"></script>
    <script src="./home.js"></script>
</body>
</html>
