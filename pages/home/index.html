<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8"> <!-- Allows us to use accents, emojis, and special characters in our text-->
    <!-- icon load-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Uniquiz — An Intuitive Quiz App</title>

    <!--Bootstrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!--Navigation bar built off css-->
    <nav class= "navbar navbar-expand-lg navbar-dark shadow-sm custom-navbar">
        <div class= "container">
            <a class="navbar-brand fw-bold" href="#">Uniquiz</a>
        </div>
    </nav>
    <!--Desc-->
    <header class="hero-section text-white text-center py-5">
        <div class="container">
            <h1 class="text-center mb-4">
                <i class="bi bi-patch-question-fill me-2 hero-icon"></i>
                UniQuiz
            </h1>
            <p class="lead mb-0">
                An intuitive quiz app designed to help you learn, practice, and track your progress.
            </p>
        </div>
    </header>
 
    <section id="past-scores", class="container my-4">
        <h2>Past Scores</h2>

        <table id="past-scores-header" class="shadow">
            <thead id="past-scores-table-header">
                <th>Quiz Name</th>
                <th>Score</th>
                <th>Percent</th>
            </thead>
        </table>

        <div id="past-scores-scroll-container" class="shadow">
            <table id="past-scores-table">
                <tbody id="past-scores-table-body">
                </tbody>
            </table>
        </div>
    </section>

    <!--Quiz search and list of available quizes-->
    <section id="quiz-selection" class="container my-4">
        <h2>Find a Quiz</h2>
        <p>Search by title or category to get started.</p>

        <form id="search-form">
            <!-- search dropdown --->
            <select name="options" id="search-options" class="form-control">
                <option value="title">Title</option>
                <option value="catagory">Catagory</option>
                <option value="difficulty">Difficulty</option>
            </select>
            <!-- search bar -->
            <input 
                id="quiz-search" 
                name="search"
                type="text" 
                class="form-control mb-3"
                placeholder="Search quizzes..."
            >
        </form>
        <!-- Browse all quizzes -->
        <h3 class="h4 fw-semibold mb-3">Browse All Quizzes</h3>
        <div id="browse-quizzes" class="row g-3">
        <!-- JS will insert quiz cards here -->
        </div>

        <!-- Quiz list that will be finished in JS-->
         <div id="quiz-list" class="d-flex flex-column gap-2">
            <!-- JS quiz buttons here-->
            <quiz-card class="shadow" json="test_quiz.json"></quiz-card>
            <quiz-card class="shadow" json="javascript_quiz.json"></quiz-card>
         </div>

    </section>  

    <!-- footer-->
     <footer class="text-center p-3 mt-4">
        <p>Uniquiz — CS212 Group Project</p>
    </footer>

    <script src="../../lib/libquizjson.js"></script>
    <script src="../../lib/libscore.js"></script>
    <script src="home.js"></script>

</body>
